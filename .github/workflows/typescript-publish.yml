name: Publish TypeScript SDK

on:
  push:
    tags:
      - 'typescript/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.4.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('typescript/v{0}', inputs.version) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/typescript/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Run type check
        working-directory: typescript
        run: npm run typecheck

      - name: Build SDK
        working-directory: typescript
        run: npm run build

      - name: Run tests
        working-directory: typescript
        run: npm test || echo "Warning: Tests failed or not configured"
        continue-on-error: true

      - name: Verify package.json version
        working-directory: typescript
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Publish to npm
        working-directory: typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "Published @northrelay/sdk@${{ steps.version.outputs.version }} to npm"
          echo "Package: https://www.npmjs.com/package/@northrelay/sdk"
